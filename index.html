<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1,
viewport-fit=cover
"
/>

<title>Nova Stranger</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

:root{

    --bg:#020617;

    --card:
    rgba(15,23,42,.72);

    --card2:
    rgba(30,41,59,.75);

    --blue:#2563eb;

    --blue2:#7c3aed;

    --green:#22c55e;

    --red:#dc2626;

    --text:#ffffff;

    --sub:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

html,
body{

    width:100%;
    height:100%;

    overflow:hidden;

    background:
    radial-gradient(
        circle at top,
        #0f172a,
        #020617
    );
}

body{
    color:white;
    position:relative;
}



/* STAR */

body::before{

    content:"";

    position:fixed;
    inset:0;

    background-image:

    radial-gradient(
        white 1px,
        transparent 1px
    ),

    radial-gradient(
        #60a5fa 1px,
        transparent 1px
    ),

    radial-gradient(
        #a855f7 1px,
        transparent 1px
    );

    background-size:
    120px 120px,
    180px 180px,
    240px 240px;

    opacity:.18;

    animation:
    starsMove 60s linear infinite;

    pointer-events:none;
}

@keyframes starsMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-120px);
    }

}



/* FINDING */

.finding{

    position:fixed;
    inset:0;

    background:
    rgba(2,6,23,.94);

    backdrop-filter:blur(10px);

    z-index:999999;

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    gap:18px;
}

.loader{

    width:90px;
    height:90px;

    border-radius:50%;

    border:
    5px solid rgba(255,255,255,.1);

    border-top:
    5px solid #7c3aed;

    animation:
    spin 1s linear infinite;
}

@keyframes spin{

    from{
        transform:rotate(0);
    }

    to{
        transform:rotate(360deg);
    }

}

.finding-title{

    font-size:26px;

    font-weight:800;
}

.finding-sub{

    color:var(--sub);
}



/* APP */

.app{

    width:100%;
    height:100dvh;

    display:flex;
    flex-direction:column;
}



/* TOPBAR */

.topbar{

    height:72px;

    background:
    rgba(15,23,42,.58);

    backdrop-filter:
    blur(18px);

    border-bottom:
    1px solid rgba(255,255,255,.05);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 16px;

    flex-shrink:0;
}

.top-left{

    display:flex;
    align-items:center;

    gap:12px;
}

.logo{

    width:50px;
    height:50px;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;

    box-shadow:
    0 0 24px rgba(124,58,237,.35);
}

.info{

    display:flex;
    flex-direction:column;
}

.title{

    font-size:19px;

    font-weight:800;
}

.status{

    font-size:12px;

    color:#4ade80;
}

.next-btn{

    border:none;

    background:
    linear-gradient(
        135deg,
        #dc2626,
        #b91c1c
    );

    color:white;

    height:46px;

    padding:0 18px;

    border-radius:16px;

    cursor:pointer;

    font-weight:700;
}



/* MESSAGES */

.messages{

    flex:1;

    overflow-y:auto;

    padding:16px;

    display:flex;
    flex-direction:column;

    gap:12px;
}

.row{
    display:flex;
}

.row.me{
    justify-content:flex-end;
}

.msg{

    max-width:82%;

    background:
    rgba(30,41,59,.6);

    backdrop-filter:
    blur(12px);

    padding:12px;

    border-radius:22px;

    border:
    1px solid rgba(255,255,255,.04);
}

.row.me .msg{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    box-shadow:
    0 0 24px rgba(124,58,237,.25);
}

.text{

    font-size:15px;

    line-height:1.55;

    word-break:break-word;
}

.chat-image{

    width:100%;

    max-width:260px;

    border-radius:16px;

    cursor:pointer;
}



/* SYSTEM */

.system{

    text-align:center;

    opacity:.7;

    font-size:14px;

    padding:8px;
}



/* BOTTOM */

.bottom{

    background:
    rgba(15,23,42,.58);

    backdrop-filter:
    blur(18px);

    border-top:
    1px solid rgba(255,255,255,.05);

    padding:10px;

    padding-bottom:
    calc(
        env(safe-area-inset-bottom)
        + 10px
    );
}

.sendbox{

    display:flex;

    gap:8px;
}

.image-btn{

    width:52px;
    height:52px;

    background:
    rgba(255,255,255,.06);

    border-radius:16px;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:18px;
}

.send-input{

    flex:1;

    border:none;
    outline:none;

    background:
    rgba(255,255,255,.06);

    color:white;

    padding:0 14px;

    border-radius:16px;

    font-size:16px;
}

.send-btn{

    width:52px;
    height:52px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    cursor:pointer;

    font-size:18px;
}



/* IMAGE VIEWER */

.image-viewer{

    position:fixed;
    inset:0;

    background:
    rgba(0,0,0,.95);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:999999;
}

.viewer-image{

    max-width:100%;
    max-height:100%;

    border-radius:18px;
}



/* MOBILE */

@media(max-width:700px){

    .topbar{

        height:64px;

        padding:8px 10px;
    }

    .logo{

        width:42px;
        height:42px;

        border-radius:14px;

        font-size:18px;
    }

    .title{
        font-size:16px;
    }

    .status{
        font-size:11px;
    }

    .next-btn{

        height:42px;

        padding:0 14px;

        border-radius:14px;

        font-size:13px;
    }

    .messages{

        padding:10px;

        gap:8px;
    }

    .msg{

        max-width:88%;

        border-radius:18px;
    }

    .text{

        font-size:15px;
    }

}

</style>

</head>

<body>



<!-- FINDING -->

<div class="finding" id="finding">

    <div class="loader"></div>

    <div class="finding-title">
        Đang tìm người lạ...
    </div>

    <div class="finding-sub">
        Matching realtime 😏
    </div>

</div>



<!-- APP -->

<div class="app">

    <div class="topbar">

        <div class="top-left">

            <div class="logo">
                ✦
            </div>

            <div class="info">

                <div class="title">
                    Nova Stranger
                </div>

                <div
                    class="status"
                    id="status"
                >
                    ● Đang kết nối...
                </div>

            </div>

        </div>



        <button
            id="nextBtn"
            class="next-btn"
        >
            Next
        </button>

    </div>



    <div
        id="messages"
        class="messages"
    ></div>



    <div class="bottom">

        <div class="sendbox">

            <label
                class="image-btn"
                for="imageInput"
            >
                📷
            </label>

            <input
                type="file"
                id="imageInput"
                accept="image/*"
                hidden
            >

            <input
                id="messageInput"
                class="send-input"
                placeholder="Nhắn gì đó..."
            >

            <button
                id="sendBtn"
                class="send-btn"
            >
                ➤
            </button>

        </div>

    </div>

</div>



<!-- IMAGE VIEW -->

<div
    id="imageViewer"
    class="image-viewer"
>

    <img
        id="viewerImage"
        class="viewer-image"
    >

</div>



<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

firebase.initializeApp({

    apiKey:
    "YOUR_API_KEY",

    authDomain:
    "YOUR_PROJECT.firebaseapp.com",

    databaseURL:
    "https://YOUR_PROJECT-default-rtdb.asia-southeast1.firebasedatabase.app",

    projectId:
    "YOUR_PROJECT",

    storageBucket:
    "YOUR_PROJECT.appspot.com",

    messagingSenderId:
    "XXXX",

    appId:
    "XXXX"

});

const db =
firebase.database();



const messages =
document.getElementById("messages");

const sendBtn =
document.getElementById("sendBtn");

const nextBtn =
document.getElementById("nextBtn");

const messageInput =
document.getElementById("messageInput");

const statusEl =
document.getElementById("status");

const finding =
document.getElementById("finding");

const imageInput =
document.getElementById("imageInput");

const imageViewer =
document.getElementById("imageViewer");

const viewerImage =
document.getElementById("viewerImage");



const myId =

Math.random()
.toString(36)
.slice(2);



let roomId = null;

let partnerLeft = false;



/* MATCH */

async function findPartner(){

    finding.style.display =
    "flex";

    const waitingRef =
    db.ref("waitingUsers");

    const snap =
    await waitingRef.once("value");

    let found = null;

    snap.forEach((s)=>{

        if(s.key !== myId && !found){

            found = s.key;
        }

    });



    if(found){

        roomId =
        "room_" +
        Date.now();

        await db.ref(
            "rooms/" + roomId
        ).set({

            users:{
                a:myId,
                b:found
            }
        });

        await waitingRef
        .child(found)
        .remove();

        startChat();

    }else{

        await waitingRef
        .child(myId)
        .set(true);

        waitingRef.on(

            "child_removed",

            async (s)=>{

                if(
                    s.key === myId
                ){

                    const rooms =
                    await db.ref(
                        "rooms"
                    ).once("value");

                    rooms.forEach((r)=>{

                        const d =
                        r.val();

                        if(

                            d.users &&

                            (
                                d.users.a === myId ||

                                d.users.b === myId
                            )
                        ){

                            roomId =
                            r.key;
                        }

                    });

                    if(roomId){

                        startChat();
                    }

                }

            }

        );

    }

}



/* START CHAT */

function startChat(){

    finding.style.display =
    "none";

    statusEl.innerHTML =
    "● Đã kết nối";



    db.ref(
        "rooms/" + roomId + "/messages"
    ).on(

        "child_added",

        (snapshot)=>{

            const data =
            snapshot.val();

            const row =
            document.createElement("div");

            row.className =
            "row " +

            (
                data.user === myId
                ? "me"
                : ""
            );

            row.innerHTML = `

                <div class="msg">

                    ${
                        data.text
                        ?
                        `
                        <div class="text">
                            ${safe(data.text)}
                        </div>
                        `
                        :
                        ""
                    }

                    ${
                        data.image
                        ?
                        `
                        <img

                            src="${data.image}"

                            class="chat-image"

                            onclick="
                                openImageViewer(
                                    '${data.image}'
                                )
                            "
                        >
                        `
                        :
                        ""
                    }

                </div>

            `;

            messages.appendChild(row);

            messages.scrollTop =
            messages.scrollHeight;
        }

    );



    /* PARTNER LEAVE */

    db.ref(
        "rooms/" + roomId + "/leave"
    ).on(

        "value",

        (snap)=>{

            if(
                snap.exists()
                &&
                !partnerLeft
            ){

                partnerLeft = true;

                statusEl.innerHTML =
                "● Người kia đã thoát";

                const row =
                document.createElement(
                    "div"
                );

                row.className =
                "system";

                row.innerHTML =
                "Người kia đã thoát 😭";

                messages.appendChild(
                    row
                );

                messages.scrollTop =
                messages.scrollHeight;
            }

        }

    );

}



/* SEND */

function sendMessage(){

    const text =
    messageInput.value.trim();

    if(!text || !roomId)
    return;

    db.ref(
        "rooms/" +
        roomId +
        "/messages"
    ).push({

        text:text,

        user:myId
    });

    messageInput.value = "";
}



sendBtn.onclick =
sendMessage;



messageInput.addEventListener(

    "keydown",

    (e)=>{

        if(e.key === "Enter"){

            sendMessage();
        }

    }

);



/* IMAGE */

imageInput.addEventListener(

    "change",

    ()=>{

        const file =
        imageInput.files[0];

        if(!file) return;

        if(
            file.size >
            1024 * 300
        ){

            alert("Ảnh quá lớn 😭");

            return;
        }

        const reader =
        new FileReader();

        reader.onload =

        function(e){

            db.ref(

                "rooms/" +
                roomId +
                "/messages"

            ).push({

                image:e.target.result,

                user:myId
            });

        };

        reader.readAsDataURL(
            file
        );

    }

);



/* NEXT */

nextBtn.onclick =

async function(){

    if(roomId){

        await db.ref(

            "rooms/" +
            roomId +
            "/leave"

        ).set(true);

    }

    location.reload();
};



/* TAB CLOSE */

window.addEventListener(

    "beforeunload",

    ()=>{

        if(roomId){

            db.ref(

                "rooms/" +
                roomId +
                "/leave"

            ).set(true);
        }

    }

);



/* IMAGE VIEW */

window.openImageViewer =

function(src){

    viewerImage.src =
    src;

    imageViewer.style.display =
    "flex";
};

imageViewer.onclick =

function(){

    imageViewer.style.display =
    "none";
};



/* SAFE */

function safe(text){

    return String(text)

    .replace(/</g,"&lt;")

    .replace(/>/g,"&gt;");
}



/* RUN */

findPartner();

</script>

</body>
</html>
