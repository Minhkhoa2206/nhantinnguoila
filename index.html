<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1,
viewport-fit=cover
"
/>

<title>Nova Stranger</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

:root{
    --bg:#020617;
    --card:rgba(15,23,42,.72);
    --card2:rgba(30,41,59,.75);
    --blue:#2563eb;
    --blue2:#7c3aed;
    --green:#22c55e;
    --red:#dc2626;
    --text:#ffffff;
    --sub:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;

    background:
    radial-gradient(
        circle at top,
        #0f172a,
        #020617
    );
}

body{
    color:white;
    position:relative;
}



/* STAR */

body::before{

    content:"";

    position:fixed;
    inset:0;

    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(#60a5fa 1px, transparent 1px),
    radial-gradient(#a855f7 1px, transparent 1px);

    background-size:
    120px 120px,
    180px 180px,
    240px 240px;

    opacity:.18;

    animation:
    starsMove 60s linear infinite;

    pointer-events:none;
}

@keyframes starsMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-120px);
    }

}



/* HEART RAIN */

.heart{

    position:fixed;

    top:-50px;

    font-size:24px;

    pointer-events:none;

    z-index:999999;

    animation:
    heartFall linear forwards;
}

@keyframes heartFall{

    from{

        transform:
        translateY(-50px)
        rotate(0deg);

        opacity:1;
    }

    to{

        transform:
        translateY(110vh)
        rotate(360deg);

        opacity:0;
    }

}



/* FINDING */

.finding{

    position:fixed;
    inset:0;

    background:
    rgba(2,6,23,.94);

    backdrop-filter:blur(10px);

    z-index:999999;

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    gap:18px;
}

.loader{

    width:90px;
    height:90px;

    border-radius:50%;

    border:
    5px solid rgba(255,255,255,.1);

    border-top:
    5px solid #7c3aed;

    animation:
    spin 1s linear infinite;
}

@keyframes spin{

    from{
        transform:rotate(0);
    }

    to{
        transform:rotate(360deg);
    }

}

.finding-title{
    font-size:26px;
    font-weight:800;
}

.finding-sub{
    color:var(--sub);
}



/* APP */

.app{
    width:100%;
    height:100dvh;

    display:flex;
    flex-direction:column;
}



/* TOPBAR */

.topbar{

    height:72px;

    background:
    rgba(15,23,42,.58);

    backdrop-filter:
    blur(18px);

    border-bottom:
    1px solid rgba(255,255,255,.05);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 16px;

    flex-shrink:0;
}

.top-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo{

    width:50px;
    height:50px;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;

    box-shadow:
    0 0 24px rgba(124,58,237,.35);
}

.info{
    display:flex;
    flex-direction:column;
}

.title{
    font-size:19px;
    font-weight:800;
}

.status{
    font-size:12px;
    color:#4ade80;
    margin-top:2px;
}

.next-btn{

    border:none;

    background:
    linear-gradient(
        135deg,
        #dc2626,
        #b91c1c
    );

    color:white;

    height:46px;

    padding:0 18px;

    border-radius:16px;

    cursor:pointer;

    font-weight:700;
}



/* MESSAGES */

.messages{

    flex:1;

    overflow-y:auto;

    padding:16px;

    display:flex;
    flex-direction:column;

    gap:12px;
}

.row{
    display:flex;
}

.row.me{
    justify-content:flex-end;
}

.msg{

    max-width:82%;

    background:
    rgba(30,41,59,.6);

    backdrop-filter:
    blur(12px);

    padding:12px;

    border-radius:22px;

    border:
    1px solid rgba(255,255,255,.04);
}

.row.me .msg{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    box-shadow:
    0 0 24px rgba(124,58,237,.25);
}

.text{

    font-size:15px;

    line-height:1.55;

    word-break:break-word;
}

.chat-image{

    width:100%;

    max-width:260px;

    border-radius:16px;

    cursor:pointer;
}



/* BOTTOM */

.bottom{

    background:
    rgba(15,23,42,.58);

    backdrop-filter:
    blur(18px);

    border-top:
    1px solid rgba(255,255,255,.05);

    padding:10px;

    padding-bottom:
    calc(
        env(safe-area-inset-bottom)
        + 10px
    );
}

.sendbox{
    display:flex;
    gap:8px;
}

.image-btn{

    width:52px;
    height:52px;

    background:
    rgba(255,255,255,.06);

    border-radius:16px;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:18px;
}

.send-input{

    flex:1;

    border:none;
    outline:none;

    background:
    rgba(255,255,255,.06);

    color:white;

    padding:0 14px;

    border-radius:16px;

    font-size:16px;
}

.send-btn{

    width:52px;
    height:52px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    cursor:pointer;

    font-size:18px;
}



/* IMAGE VIEWER */

.image-viewer{

    position:fixed;
    inset:0;

    background:
    rgba(0,0,0,.95);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:999999;
}

.viewer-image{

    max-width:100%;
    max-height:100%;

    border-radius:18px;
}



/* MOBILE */

@media(max-width:700px){

    .topbar{
        height:64px;
        padding:8px 10px;
    }

    .logo{
        width:42px;
        height:42px;
        border-radius:14px;
        font-size:18px;
    }

    .title{
        font-size:16px;
    }

    .status{
        font-size:11px;
    }

    .next-btn{
        height:42px;
        padding:0 14px;
        border-radius:14px;
        font-size:13px;
    }

    .messages{
        padding:10px;
        gap:8px;
    }

    .msg{
        max-width:88%;
        border-radius:18px;
    }

    .text{
        font-size:15px;
    }

}

</style>

</head>

<body>



<!-- FINDING -->

<div class="finding" id="finding">

    <div class="loader"></div>

    <div class="finding-title">
        Đang tìm người lạ...
    </div>

    <div class="finding-sub">
        Matching realtime 😏
    </div>

</div>



<!-- APP -->

<div class="app">

    <div class="topbar">

        <div class="top-left">

            <div class="logo">
                ✦
            </div>

            <div class="info">

                <div class="title">
                    Nova Stranger
                </div>

                <div
                    class="status"
                    id="status"
                >
                    ● Đang kết nối...
                </div>

                <div
                    class="status"
                    id="totalUsers"
                    style="color:#60a5fa"
                >
                    👥 0 người đã tham gia
                </div>

            </div>

        </div>

        <button
            id="nextBtn"
            class="next-btn"
        >
            Next
        </button>

    </div>



    <div
        id="messages"
        class="messages"
    ></div>



    <div class="bottom">

        <div class="sendbox">

            <label
                class="image-btn"
                for="imageInput"
            >
                📷
            </label>

            <input
                type="file"
                id="imageInput"
                accept="image/*"
                hidden
            >

            <input
                id="messageInput"
                class="send-input"
                placeholder="Nhắn gì đó..."
            >

            <button
                id="heartBtn"
                class="send-btn"
            >
                💖
            </button>

            <button
                id="sendBtn"
                class="send-btn"
            >
                ➤
            </button>

        </div>

    </div>

</div>



<!-- IMAGE VIEW -->

<div
    id="imageViewer"
    class="image-viewer"
>

    <img
        id="viewerImage"
        class="viewer-image"
    >

</div>



<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

firebase.initializeApp({

    apiKey:
    "AIzaSyBkRFn4i_tPSFKUMhC_xVWrL2u43gBPLqM",

    authDomain:
    "vercel-mk.firebaseapp.com",

    databaseURL:
    "https://vercel-mk-default-rtdb.asia-southeast1.firebasedatabase.app",

    projectId:
    "vercel-mk",

    storageBucket:
    "vercel-mk.firebasestorage.app",

    messagingSenderId:
    "1041836554984",

    appId:
    "1:1041836554984:web:da8011543b29b8f47ae75d"

});

const db =
firebase.database();



const messages =
document.getElementById("messages");

const sendBtn =
document.getElementById("sendBtn");

const heartBtn =
document.getElementById("heartBtn");

const nextBtn =
document.getElementById("nextBtn");

const messageInput =
document.getElementById("messageInput");

const statusEl =
document.getElementById("status");

const finding =
document.getElementById("finding");

const imageInput =
document.getElementById("imageInput");

const imageViewer =
document.getElementById("imageViewer");

const viewerImage =
document.getElementById("viewerImage");

const totalUsersEl =
document.getElementById(
    "totalUsers"
);



/* USER */

let myId =
localStorage.getItem(
    "nova_myid"
);

if(!myId){

    myId =
    Math.random()
    .toString(36)
    .slice(2);

    localStorage.setItem(
        "nova_myid",
        myId
    );
}



/* TOTAL USERS */

const totalUsersRef =
db.ref("system/totalUsers");

const usedBefore =
localStorage.getItem(
    "nova_used"
);

if(!usedBefore){

    totalUsersRef.transaction(
        (current)=>{

            return (current || 0) + 1;

        }
    );

    localStorage.setItem(
        "nova_used",
        "1"
    );
}



/* LOAD TOTAL USERS */

db.ref("system/totalUsers")
.on(

    "value",

    (snap)=>{

        const total =
        snap.val() || 0;

        totalUsersEl.innerHTML =
        "👥 " +
        total +
        " người đã tham gia";
    }

);



/* ROOM */

let roomId =
localStorage.getItem(
    "nova_room"
);



/* HEART EFFECT */

function spawnHearts(){

    for(

        let i = 0;

        i < 100;

        i++

    ){

        const heart =
        document.createElement("div");

        heart.className =
        "heart";

        heart.innerHTML = "💖";

        heart.style.left =
        Math.random() * 100 + "vw";

        heart.style.animationDuration =
        3 + Math.random() * 3 + "s";

        heart.style.fontSize =
        18 + Math.random() * 26 + "px";

        document.body.appendChild(
            heart
        );

        setTimeout(()=>{

            heart.remove();

        },6000);

    }

}



/* RESTORE */

async function restoreRoom(){

    if(!roomId)
    return false;

    const snap =
    await db.ref(
        "rooms/" + roomId
    ).once("value");

    if(snap.exists()){

        startChat();

        return true;
    }

    localStorage.removeItem(
        "nova_room"
    );

    roomId = null;

    return false;
}



/* FIND */

async function findPartner(){

    finding.style.display =
    "flex";

    const waitingRef =
    db.ref("waitingUsers");

    const snap =
    await waitingRef.once("value");

    let found = null;

    snap.forEach((s)=>{

        if(
            s.key !== myId &&
            !found
        ){

            found = s.key;
        }

    });

    if(found){

        roomId =
        "room_" +
        Date.now();

        localStorage.setItem(
            "nova_room",
            roomId
        );

        await db.ref(
            "rooms/" + roomId
        ).set({

            users:{
                a:myId,
                b:found
            },

            createdAt:
            Date.now()

        });

        await waitingRef
        .child(found)
        .remove();

        startChat();

    }else{

        await waitingRef
        .child(myId)
        .set({

            time:Date.now()
        });

        waitingRef.on(

            "child_removed",

            async (s)=>{

                if(
                    s.key === myId
                ){

                    const rooms =
                    await db.ref(
                        "rooms"
                    ).once("value");

                    rooms.forEach((r)=>{

                        const d =
                        r.val();

                        if(

                            d.users &&

                            (
                                d.users.a === myId ||

                                d.users.b === myId
                            )

                        ){

                            roomId =
                            r.key;

                            localStorage.setItem(
                                "nova_room",
                                roomId
                            );

                        }

                    });

                    if(roomId){

                        startChat();
                    }

                }

            }

        );

    }

}



/* CHAT */

let loaded = false;

function startChat(){

    if(loaded)
    return;

    loaded = true;

    finding.style.display =
    "none";

    statusEl.innerHTML =
    "● Đã kết nối";



    /* ONLINE */

    const onlineRef =
    db.ref(

        "rooms/" +
        roomId +
        "/online/" +
        myId

    );

    onlineRef.set(true);

    onlineRef.onDisconnect()
    .remove();



    /* HEART LISTENER */

    db.ref(

        "rooms/" +
        roomId +
        "/effects"

    ).on(

        "child_added",

        (snap)=>{

            const data =
            snap.val();

            if(
                data &&
                data.type === "heart"
            ){

                spawnHearts();
            }

        }

    );



    /* MESSAGE */

    db.ref(

        "rooms/" +
        roomId +
        "/messages"

    ).on(

        "child_added",

        (snapshot)=>{

            const data =
            snapshot.val();

            const row =
            document.createElement(
                "div"
            );

            row.className =

                "row " +

                (
                    data.user === myId
                    ? "me"
                    : ""
                );

            row.innerHTML = `

                <div class="msg">

                    ${
                        data.text
                        ?
                        `
                        <div class="text">
                            ${safe(data.text)}
                        </div>
                        `
                        :
                        ""
                    }

                    ${
                        data.image
                        ?
                        `
                        <img
                            src="${data.image}"
                            class="chat-image"
                            onclick="
                                openImageViewer(
                                    '${data.image}'
                                )
                            "
                        >
                        `
                        :
                        ""
                    }

                </div>

            `;

            messages.appendChild(
                row
            );

            messages.scrollTop =
            messages.scrollHeight;

        }

    );



    /* WATCH */

    db.ref(

        "rooms/" +
        roomId +
        "/online"

    ).on(

        "value",

        (snap)=>{

            const online =
            snap.val();

            if(
                online &&
                Object.keys(online)
                .length >= 2
            ){

                statusEl.innerHTML =
                "● Đã kết nối";

            }else{

                statusEl.innerHTML =
                "● Người kia đã thoát 😢";
            }

        }

    );

}



/* SEND */

function sendMessage(){

    const text =
    messageInput.value.trim();

    if(
        !text ||
        !roomId
    ) return;

    db.ref(

        "rooms/" +
        roomId +
        "/messages"

    ).push({

        text:text,

        user:myId,

        time:Date.now()

    });

    messageInput.value = "";
}

sendBtn.onclick =
sendMessage;



/* SEND HEART */

heartBtn.onclick =
function(){

    if(!roomId)
    return;

    db.ref(

        "rooms/" +
        roomId +
        "/effects"

    ).push({

        type:"heart",

        user:myId,

        time:Date.now()

    });

};



messageInput.addEventListener(

    "keydown",

    (e)=>{

        if(e.key === "Enter"){

            sendMessage();
        }

    }

);



/* IMAGE */

imageInput.addEventListener(

    "change",

    ()=>{

        const file =
        imageInput.files[0];

        if(!file)
        return;

        if(
            file.size >
            1024 * 300
        ){

            alert("Ảnh quá lớn 😭");

            return;
        }

        const reader =
        new FileReader();

        reader.onload =

        function(e){

            db.ref(

                "rooms/" +
                roomId +
                "/messages"

            ).push({

                image:
                e.target.result,

                user:myId,

                time:Date.now()

            });

        };

        reader.readAsDataURL(
            file
        );

    }

);



/* NEXT */

nextBtn.onclick =
async function(){

    if(roomId){

        await db.ref(

            "rooms/" +
            roomId +
            "/online/" +
            myId

        ).remove();

    }

    localStorage.removeItem(
        "nova_room"
    );

    location.reload();
};



/* IMAGE VIEW */

window.openImageViewer =

function(src){

    viewerImage.src =
    src;

    imageViewer.style.display =
    "flex";
};

imageViewer.onclick =

function(){

    imageViewer.style.display =
    "none";
};



/* SAFE */

function safe(text){

    return String(text)

    .replace(/</g,"&lt;")

    .replace(/>/g,"&gt;");
}



/* CLEAN SYSTEM */

setInterval(async ()=>{

    const waiting =
    await db.ref(
        "waitingUsers"
    ).once("value");

    waiting.forEach((s)=>{

        const data =
        s.val();

        if(

            !data ||

            Date.now() -
            data.time >

            1000 * 60 * 5

        ){

            db.ref(
                "waitingUsers/" +
                s.key
            ).remove();
        }

    });

    const rooms =
    await db.ref(
        "rooms"
    ).once("value");

    rooms.forEach((r)=>{

        const d = r.val();

        if(!d) return;

        if(!d.createdAt)
        return;

        if(

            d.online &&

            Object.keys(
                d.online
            ).length > 0

        ){

            return;
        }

        const age =
        Date.now() -
        d.createdAt;

        if(
            age >
            1000 * 60 * 2
        ){

            db.ref(
                "rooms/" +
                r.key
            ).remove();
        }

    });

},30000);



/* RUN */

restoreRoom().then((ok)=>{

    if(!ok){

        findPartner();
    }

});

</script>

</body>
</html>
